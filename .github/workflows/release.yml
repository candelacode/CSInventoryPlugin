name: Plugin-release

on:
  push:
    tags:
    - 'v*'

env:
  CONFIGURATION: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  DOTNET_SDK_VERSION: 10.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        show-progress: false
        submodules: recursive

    - name: Setup .NET Core
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

    - name: Verify .NET Core
      run: dotnet --info

    - name: Extract version from Directory.Build.props
      id: props-version
      uses: mavrosxristoforos/get-xml-info@cc0a00b30a53c3adf0ea2cbfd8314cea394fbbad # 2.1.0
      with:
        xml-file: 'Directory.Build.props'
        xpath: '//Version'

    - name: Verify tag matches plugin version
      shell: sh
      run: |
        set -eu
        tag_version="${GITHUB_REF_NAME#v}"
        props_version="${{ steps.props-version.outputs.info }}"
        if [ "$tag_version" != "$props_version" ]; then
          echo "ERROR: Tag version '${tag_version}' does not match Directory.Build.props version '${props_version}'"
          exit 1
        fi
        echo "Version match: ${tag_version}"

    - name: Build plugin
      env:
        PLUGIN_NAME: CSInventory.Plugin
      run: |
        set -eu
        dotnet publish "$PLUGIN_NAME" -c "$CONFIGURATION" -o "out/plugin/${PLUGIN_NAME}" -p:ContinuousIntegrationBuild=true -p:TargetLatestRuntimePatch=false -p:UseAppHost=false --nologo

    - name: Create release zip
      env:
        PLUGIN_NAME: CSInventory.Plugin
      shell: sh
      run: |
        set -eu
        (cd "out/plugin/${PLUGIN_NAME}" && zip -q -r -9 "../../${PLUGIN_NAME}.zip" .)

    - name: Create GitHub release
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
      with:
        allowUpdates: true
        artifactErrorsFailBuild: true
        artifacts: "out/CSInventory.Plugin.zip"
        bodyFile: .github/RELEASE_TEMPLATE.md
        immutableCreate: true
        makeLatest: false
        name: CSInventory.Plugin V${{ github.ref_name }}
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}
        updateOnlyUnreleased: true
